version: '3.9'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: biblequiz
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/biblequiz
      SECRET_KEY: changemeplease
      ACCESS_TOKEN_EXPIRE_MINUTES: '1440'
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin123
    ports:
      - '8000:8000'
    depends_on:
      - db
    volumes:
      - ./backend:/app

volumes:
  db_data:
