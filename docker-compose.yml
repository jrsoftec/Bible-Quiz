version: '3.9'
services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: sqlite:///./bible_quiz.db
      SECRET_KEY: changemeplease
      ACCESS_TOKEN_EXPIRE_MINUTES: '1440'
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin123
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app
